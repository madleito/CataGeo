<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geología — Estructura de la Tierra</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&display=swap" rel="stylesheet" />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tierra: {
              bg: '#FAF6F0',
              cream: '#F0E9DF',
              sand: '#E6DDD1',
              slate: '#4A5568',
              charcoal: '#2C3639',
            },
            petrol: {
              DEFAULT: '#1B4965',
              light: '#2A6F97',
              dark: '#143B52',
            },
            terracotta: {
              DEFAULT: '#C1666B',
              light: '#D4898D',
              dark: '#A34E52',
            },
            ochre: {
              DEFAULT: '#D4A373',
              light: '#E2BF9A',
              dark: '#B8854F',
            },
            volcanic: {
              DEFAULT: '#E76F51',
              light: '#F09A83',
              dark: '#D4533A',
            },
            turquoise: {
              DEFAULT: '#2A9D8F',
              light: '#52B7AB',
              dark: '#1F7A6F',
            },
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"Source Serif 4"', 'serif'],
          },
        },
      },
    }
  </script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background-color: #FAF6F0;
      color: #2C3639;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Tab indicator animation */
    .tab-active {
      position: relative;
    }
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 15%;
      width: 70%;
      height: 3px;
      border-radius: 2px;
      background: #E76F51;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    /* Page transition */
    .page-enter {
      animation: fadeUp 0.35s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4A373; border-radius: 3px; }

    /* Flashcard flip */
    .flip-perspective { perspective: 1000px; }
    .flip-card {
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      position: relative;
    }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      position: absolute;
      inset: 0;
    }
    .flip-back {
      transform: rotateY(180deg);
    }

    /* Card slide animation */
    .card-slide-in {
      animation: cardSlide 0.3s ease-out;
    }
    @keyframes cardSlide {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    // ─── Tab config ───
    const TABS = [
      { id: 'mapa',    label: 'Mapa Conceptual', icon: '🗺️', shortLabel: 'Mapa' },
      { id: 'historia', label: 'La Historia',     icon: '📖', shortLabel: 'Historia' },
      { id: 'fichas',  label: 'Fichas de Estudio', icon: '🃏', shortLabel: 'Fichas' },
      { id: 'quiz',    label: 'Quiz',             icon: '🎯', shortLabel: 'Quiz' },
    ];

    // ─── Mapa Conceptual · Estructura de la Tierra ───
    const MAPA_ESTRUCTURA = [
      {
        id: 'sistema', label: 'La Tierra como sistema', color: 'terracotta',
        children: [
          { id: 's1', label: 'Sistema cerrado', detail: 'Intercambia energía (radiación solar, calor) pero no materia de forma significativa.' },
          { id: 's2', label: 'Subsistemas', children: [
            { id: 's2a', label: 'Geosfera', detail: 'La parte sólida de la Tierra.' },
            { id: 's2b', label: 'Hidrosfera', detail: 'Toda el agua del planeta.' },
            { id: 's2c', label: 'Atmósfera', detail: 'La capa de gases.' },
            { id: 's2d', label: 'Biosfera', detail: 'Los seres vivos.' },
          ]},
          { id: 's3', label: 'Motor', detail: 'Energía solar (externa) + calor interno de la Tierra.' },
        ],
      },
      {
        id: 'metodos', label: 'Métodos de estudio del interior', color: 'petrol',
        children: [
          { id: 'm1', label: 'Métodos directos', children: [
            { id: 'm1a', label: 'Minas y simas', detail: 'Acceso hasta 3.000 m de profundidad.' },
            { id: 'm1b', label: 'Sondeos geológicos', detail: 'Hasta 12 km (Proyecto Mohole).' },
            { id: 'm1c', label: 'Volcanes', detail: 'Expulsan materiales de zonas profundas.' },
            { id: 'm1d', label: 'Orógenos', detail: 'Materiales de cierta profundidad afloran en superficie.' },
            { id: 'm1e', label: 'Limitación', detail: 'Solo acceden a los primeros metros del manto.' },
          ]},
          { id: 'm2', label: 'Métodos indirectos', children: [
            { id: 'm2a', label: 'Gravimétrico', detail: 'Anomalías en la gravedad → localización de yacimientos.' },
            { id: 'm2b', label: 'Temperatura', detail: 'Gradiente geotérmico: 3°C cada 100 m.' },
            { id: 'm2c', label: 'Magnetismo terrestre', detail: 'Anomalías magnéticas → yacimientos de hierro.' },
            { id: 'm2d', label: 'Eléctrico', detail: 'Resistividad → aguas subterráneas, yacimientos. Preciso hasta 1.000 m.' },
            { id: 'm2e', label: 'Meteoritos', detail: 'Composición similar a planetesimales originales.' },
            { id: 'm2f', label: 'Método sísmico ★', detail: 'El más importante. Estudia ondas P y S para mapear el interior.' },
          ]},
        ],
      },
      {
        id: 'ondas', label: 'Ondas sísmicas', color: 'volcanic',
        children: [
          { id: 'o1', label: 'Ondas P', detail: 'Longitudinales, 6-13 km/s. Atraviesan todo (más lentas en fluidos).' },
          { id: 'o2', label: 'Ondas S', detail: 'Transversales, 3-8 km/s. NO atraviesan fluidos.' },
          { id: 'o3', label: 'Se refractan al cambiar de medio' },
          { id: 'o4', label: 'Discontinuidades', children: [
            { id: 'o4a', label: 'Mohorovicic (Moho)', detail: '35-70 km (continentes) / 8-10 km (océanos). P y S aceleran. Separa corteza del manto.' },
            { id: 'o4b', label: 'Gutenberg', detail: '2.900 km. P bajan velocidad, S desaparecen → medio líquido. Separa manto del núcleo externo.' },
            { id: 'o4c', label: 'Lehman', detail: '4.900-5.150 km. P aceleran → medio sólido. Separa núcleo externo del interno.' },
          ]},
        ],
      },
      {
        id: 'geoquimico', label: 'Modelo geoquímico (composición)', color: 'ochre',
        children: [
          { id: 'g1', label: 'Corteza', children: [
            { id: 'g1a', label: 'Continental', detail: '35-70 km, heterogénea, rocas antiguas (3.800 Ma), tipo granito, menos densa. Niveles: sedimentarias → metamórficas/plutónicas ácidas → metamórficas intensas/básicas.' },
            { id: 'g1b', label: 'Oceánica', detail: '8-10 km, homogénea, rocas jóvenes (180 Ma), tipo basalto, más densa. Capas: sedimentos → basaltos → gabros.' },
          ]},
          { id: 'g2', label: 'Manto', detail: 'Entre Moho y Gutenberg. Peridotitas. Manto superior + zona de transición + manto inferior.' },
          { id: 'g3', label: 'Núcleo', detail: 'Metálico: hierro, níquel, oxígeno, azufre.' },
        ],
      },
      {
        id: 'geodinamico', label: 'Modelo geodinámico (dinámica)', color: 'turquoise',
        children: [
          { id: 'd1', label: 'Litosfera', detail: 'Corteza + manto superior. Rígida, fracturada en placas. 50 km en océanos, 100-300 km en continentes.' },
          { id: 'd2', label: 'Astenosfera', detail: 'Sólida pero próxima a fusión (plástica). Ondas sísmicas se ralentizan. Sobre ella flotan las placas.' },
          { id: 'd3', label: 'Mesosfera', detail: 'Hasta 2.900 km (manto inferior). Células convectivas, plumas del manto.' },
          { id: 'd4', label: 'Capa D', detail: 'Base del manto, heterogénea. Origen de penachos térmicos.' },
          { id: 'd5', label: 'Endosfera', detail: 'Núcleo externo (fundido) + interno (sólido). Giro diferencial → campo magnético.' },
        ],
      },
      {
        id: 'pruebas', label: 'Pruebas de la tectónica de placas', color: 'terracotta',
        children: [
          { id: 'p1', label: 'Deriva continental (Wegener, 1912)', children: [
            { id: 'p1a', label: 'Pruebas geológicas', detail: 'Correlación de estructuras a ambos lados del Atlántico.' },
            { id: 'p1b', label: 'Pruebas paleontológicas', detail: 'Mismos fósiles en continentes separados.' },
            { id: 'p1c', label: 'Pruebas paleoclimáticas', detail: 'Tillitas (rocas glaciares) en regiones hoy tropicales → Pangea.' },
          ]},
          { id: 'p2', label: 'Tectónica de placas (Holmes, 1929)', detail: 'Corrientes de convección térmica mueven las placas.' },
          { id: 'p3', label: 'Magnetismo de rocas', children: [
            { id: 'p3a', label: 'Curvas de deriva polar', detail: 'Distintas por continente → los continentes se mueven.' },
            { id: 'p3b', label: 'Bandas magnéticas simétricas', detail: 'En dorsales → expansión del fondo oceánico.' },
          ]},
          { id: 'p4', label: 'Expansión del fondo oceánico (Hess, 1960)', detail: 'Corteza se forma en dorsales, se destruye en subducción. Corteza oceánica nunca supera 200 Ma.' },
        ],
      },
      {
        id: 'teoria', label: 'Teoría de la tectónica de placas', color: 'petrol',
        children: [
          { id: 't1', label: 'Placas litosféricas', detail: 'Fragmentos de litosfera que flotan sobre manto plástico. 8 grandes + menores. Mayoría mixtas (Pacífica = oceánica, Arábiga = continental).' },
          { id: 't2', label: 'Tipos de límites', children: [
            { id: 't2a', label: 'Bordes pasivos (transformantes)', detail: 'Cizalla, no crea ni destruye litosfera. Sismicidad por rozamiento. Ej: San Andrés.' },
            { id: 't2b', label: 'Bordes constructivos (dorsales)', detail: 'Tensión, magma asciende. Nueva corteza oceánica. Vulcanismo poco explosivo, sismicidad superficial.' },
            { id: 't2c', label: 'Bordes destructivos', children: [
              { id: 't2c1', label: 'Oceánica bajo continental', detail: 'Fosa oceánica, plano de Benioff, vulcanismo, cordilleras (Andes).' },
              { id: 't2c2', label: 'Oceánica bajo oceánica', detail: 'Fosa + arco de islas volcánicas (Japón).' },
              { id: 't2c3', label: 'Continental vs continental', detail: 'Gran cordillera (Himalaya). Sismicidad pero NO vulcanismo.' },
            ]},
          ]},
          { id: 't3', label: 'Motor de las placas', children: [
            { id: 't3a', label: 'Temperatura (convección)', detail: 'Columnas ascendentes calientes desde capa D, columnas descendentes frías en subducción.' },
            { id: 't3b', label: 'Gravedad', detail: 'Slab pull: litosfera densa tira de la placa al hundirse. Ridge push: empuje lateral desde dorsales.' },
          ]},
        ],
      },
    ];

    const COLOR_MAP = {
      terracotta: { dot: 'bg-terracotta', line: 'border-terracotta/30', bg: 'bg-terracotta/5', text: 'text-terracotta-dark', badge: 'bg-terracotta/10 text-terracotta-dark' },
      petrol:     { dot: 'bg-petrol',     line: 'border-petrol/30',     bg: 'bg-petrol/5',     text: 'text-petrol-dark',     badge: 'bg-petrol/10 text-petrol-dark' },
      volcanic:   { dot: 'bg-volcanic',   line: 'border-volcanic/30',   bg: 'bg-volcanic/5',   text: 'text-volcanic-dark',   badge: 'bg-volcanic/10 text-volcanic-dark' },
      ochre:      { dot: 'bg-ochre',      line: 'border-ochre/30',      bg: 'bg-ochre/5',      text: 'text-ochre-dark',      badge: 'bg-ochre/10 text-ochre-dark' },
      turquoise:  { dot: 'bg-turquoise',  line: 'border-turquoise/30',  bg: 'bg-turquoise/5',  text: 'text-turquoise-dark',  badge: 'bg-turquoise/10 text-turquoise-dark' },
    };

    function TreeNode({ node, color, depth = 0 }) {
      const [open, setOpen] = useState(false);
      const [showDetail, setShowDetail] = useState(false);
      const hasChildren = node.children && node.children.length > 0;
      const hasDetail = !!node.detail;
      const c = COLOR_MAP[color];

      return (
        <div className={depth > 0 ? `ml-4 md:ml-6 border-l-2 ${c.line}` : ''}>
          <div className={`pl-${depth > 0 ? '4' : '0'} py-1`}>
            <button
              onClick={() => {
                if (hasChildren) setOpen(!open);
                if (hasDetail) setShowDetail(!showDetail);
              }}
              className={`
                w-full text-left flex items-start gap-2.5 py-2 px-3 rounded-lg
                transition-colors duration-150 cursor-pointer
                ${(open || showDetail) ? c.bg : 'hover:bg-tierra-cream/50'}
              `}
            >
              {/* Dot / chevron */}
              <span className="mt-1.5 shrink-0">
                {hasChildren ? (
                  <span className={`inline-block text-xs transition-transform duration-200 ${c.text} ${open ? 'rotate-90' : ''}`} style={{ display: 'inline-block', transition: 'transform 0.2s' }}>
                    ▶
                  </span>
                ) : (
                  <span className={`inline-block w-2 h-2 rounded-full ${c.dot}`} />
                )}
              </span>

              {/* Label */}
              <span className={`font-body text-base leading-snug ${hasChildren ? 'font-semibold text-tierra-charcoal' : 'text-tierra-charcoal'}`}>
                {node.label}
              </span>
            </button>

            {/* Detail tooltip */}
            {hasDetail && showDetail && !hasChildren && (
              <div className={`ml-7 mr-2 mt-1 mb-2 p-3 rounded-lg ${c.bg} border ${c.line}`}>
                <p className="font-body text-sm text-tierra-charcoal leading-relaxed">{node.detail}</p>
              </div>
            )}

            {/* Children */}
            {hasChildren && open && (
              <div className="mt-1">
                {node.detail && (
                  <div className={`ml-4 md:ml-6 mb-2 p-3 rounded-lg ${c.bg}`}>
                    <p className="font-body text-sm text-tierra-slate leading-relaxed">{node.detail}</p>
                  </div>
                )}
                {node.children.map(child => (
                  <TreeNode key={child.id} node={child} color={color} depth={depth + 1} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function MapaConceptual({ data, rootLabel }) {
      const [expandAll, setExpandAll] = useState(false);
      const [key, setKey] = useState(0);

      function toggleAll() {
        setExpandAll(!expandAll);
        setKey(k => k + 1);
      }

      return (
        <div className="page-enter max-w-2xl mx-auto">
          <header className="mb-8">
            <p className="font-body text-sm uppercase tracking-widest text-volcanic mb-3">Visión global</p>
            <h2 className="font-display text-3xl md:text-4xl font-bold text-tierra-charcoal leading-tight mb-3">
              Mapa Conceptual
            </h2>
            <p className="font-body text-base text-tierra-slate leading-relaxed mb-4">
              Explora el tema completo. Toca cada rama para expandirla y ver los subnodos.
            </p>
          </header>

          {/* Root node */}
          <div className="bg-tierra-charcoal text-white rounded-xl px-5 py-4 mb-6 text-center">
            <h3 className="font-display text-lg md:text-xl font-bold">
              {rootLabel}
            </h3>
          </div>

          {/* Branches */}
          <div className="space-y-2" key={key}>
            {data.map(branch => {
              const c = COLOR_MAP[branch.color];
              return (
                <BranchNode key={branch.id} branch={branch} defaultOpen={expandAll} />
              );
            })}
          </div>
        </div>
      );
    }

    function BranchNode({ branch, defaultOpen }) {
      const [open, setOpen] = useState(defaultOpen);
      const c = COLOR_MAP[branch.color];

      return (
        <div className="rounded-xl border border-tierra-sand overflow-hidden">
          <button
            onClick={() => setOpen(!open)}
            className={`
              w-full flex items-center gap-3 px-4 py-3.5 text-left cursor-pointer
              transition-colors duration-150
              ${open ? c.bg : 'bg-white hover:bg-tierra-cream/30'}
            `}
          >
            <span className={`w-3 h-3 rounded-full shrink-0 ${c.dot}`} />
            <span className={`font-display text-base md:text-lg font-semibold ${c.text} flex-1`}>
              {branch.label}
            </span>
            <span className={`text-sm transition-transform duration-200 ${c.text} ${open ? 'rotate-90' : ''}`}>
              ▶
            </span>
          </button>

          {open && (
            <div className="px-2 pb-3 bg-white">
              {branch.children.map(child => (
                <TreeNode key={child.id} node={child} color={branch.color} depth={0} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Key term highlight helper ───
    function K({ children }) {
      return (
        <span className="bg-ochre/15 text-ochre-dark px-1 py-0.5 rounded font-semibold">
          {children}
        </span>
      );
    }

    // ─── Section divider ───
    function Divider() {
      return (
        <div className="flex items-center justify-center gap-3 my-12 md:my-16">
          <span className="block w-12 h-px bg-tierra-sand" />
          <span className="text-ochre text-lg">◆</span>
          <span className="block w-12 h-px bg-tierra-sand" />
        </div>
      );
    }

    // ─── La Historia · Estructura de la Tierra ───
    function HistoriaEstructura() {
      return (
        <article className="page-enter max-w-2xl mx-auto">
          {/* Intro */}
          <header className="mb-12 md:mb-16">
            <p className="font-body text-sm uppercase tracking-widest text-terracotta mb-3">Unidad 1 · Resumen narrativo</p>
            <h2 className="font-display text-4xl md:text-5xl font-bold text-tierra-charcoal leading-tight mb-4">
              La Tierra por dentro
            </h2>
            <p className="font-body text-lg text-tierra-slate leading-relaxed">
              Todo el tema contado como si alguien te lo estuviera explicando. Sin formato apuntes, sin aburrimiento. Lee con calma — al terminar, lo tendrás mucho más claro.
            </p>
          </header>

          {/* Sección 1 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              1. La Tierra es como una cebolla<br className="hidden md:block" />
              <span className="text-tierra-slate text-xl md:text-2xl font-normal">(pero más interesante)</span>
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              La Tierra es un <K>sistema</K>. ¿Qué significa eso? Que sus partes no van por libre — interactúan entre ellas y forman algo más complejo que la suma de las piezas. Y es un <K>sistema cerrado</K>: intercambia energía con el exterior (recibe radiación del Sol, emite calor), pero prácticamente no intercambia materia. Sí, caen meteoritos y salen naves espaciales, pero en la escala del planeta eso es despreciable.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              Tiene cuatro grandes subsistemas que están constantemente influyéndose entre sí: la <K>geosfera</K> (la parte sólida), la <K>hidrosfera</K> (el agua), la <K>atmósfera</K> (los gases) y la <K>biosfera</K> (los seres vivos). ¿Qué mueve todo esto? Dos fuentes de energía: el Sol desde fuera y el calor interno de la Tierra desde dentro.
            </p>
          </section>

          <Divider />

          {/* Sección 2 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              2. ¿Cómo sabemos lo que hay ahí abajo?
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              Nadie ha viajado al centro de la Tierra (perdón, Julio Verne). Lo más profundo que hemos llegado con un sondeo son unos <K>12 km</K>, en el <K>Proyecto Mohole</K>. Y la Tierra tiene un radio de 6.371 km. Es como intentar conocer el interior de una sandía habiendo pinchado solo la cáscara.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              Los <K>métodos directos</K> — minas (hasta 3 km), sondeos, volcanes que escupen material de las profundidades, y montañas donde afloran rocas originadas a profundidad — nos dan información real pero muy limitada. Solo llegamos a los primeros metros del manto.
            </p>
            <p className="font-body text-lg leading-relaxed mb-2">
              Así que necesitamos <K>métodos indirectos</K>, que son como hacer de detective:
            </p>
            <ul className="font-body text-lg leading-relaxed space-y-3 pl-1 mb-4">
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>El <K>método gravimétrico</K> detecta anomalías en la gravedad. Si debajo de ti hay un yacimiento de mineral muy denso, la gravedad ahí será ligeramente mayor de lo esperado. Útil para encontrar yacimientos.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>La <K>temperatura</K> aumenta 3°C cada 100 metros de profundidad (gradiente geotérmico). Pero ojo: aunque en el núcleo las temperaturas son brutales, el material no está del todo fundido porque la presión es tan enorme que mantiene las cosas en estado sólido o semifundido.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>El <K>magnetismo terrestre</K> existe porque el núcleo externo (metálico y líquido) rota a distinta velocidad que el interno. Esto crea un campo magnético. Las variaciones locales (anomalías magnéticas) nos dicen si hay rocas ricas en hierro debajo.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>El <K>método eléctrico</K> mide la resistividad de las rocas usando electrodos. Muy preciso hasta 1.000 m, luego pierde fiabilidad. Perfecto para encontrar aguas subterráneas.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>Los <K>meteoritos</K> son como cápsulas del tiempo. Vienen del cinturón de asteroides y tienen una composición parecida a los planetesimales que formaron la Tierra, así que nos cuentan de qué está hecho el interior.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>Y el campeón indiscutible: el <K>método sísmico</K>. Es el que más información nos ha dado, y merece su propia sección.</span>
              </li>
            </ul>
          </section>

          <Divider />

          {/* Sección 3 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              3. Las ondas que lo cuentan todo
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              Cuando hay un terremoto, en el punto donde se produce (el hipocentro o foco) se generan dos tipos de ondas que viajan por el interior de la Tierra:
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              Las <K>ondas P</K> (primarias) son las más rápidas (6 a 13 km/s). Son longitudinales — las partículas vibran en la misma dirección en que viaja la onda, como un muelle que se comprime y se estira. Pueden atravesar cualquier medio: sólido, líquido, gas. Pero en los fluidos van más lentas.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              Las <K>ondas S</K> (secundarias) son más lentas (3 a 8 km/s). Son transversales — las partículas vibran perpendiculares a la dirección de la onda, como cuando agitas una cuerda. El dato clave: <span className="font-bold text-terracotta-dark">NO se propagan por medios fluidos</span>. Si las ondas S desaparecen en algún punto, es que ahí hay algo líquido.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              Estas ondas cambian de velocidad y dirección (se refractan) al pasar de un material a otro. Analizando esos cambios desde muchos sismógrafos repartidos por el mundo, hemos podido mapear el interior entero de la Tierra.
            </p>

            {/* Pull quote */}
            <blockquote className="border-l-4 border-volcanic pl-5 py-2 my-8">
              <p className="font-display text-xl md:text-2xl text-tierra-charcoal italic leading-snug">
                Los puntos donde las ondas cambian bruscamente se llaman discontinuidades, y son las fronteras entre capas.
              </p>
            </blockquote>

            <ul className="font-body text-lg leading-relaxed space-y-3 pl-1 mb-4">
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span><K>Mohorovicic (Moho)</K>: a 35-70 km en continentes, 8-10 km en océanos. Aquí P y S aceleran. Separa la corteza del manto.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span><K>Gutenberg</K>: a 2.900 km. Las P bajan velocidad y las S desaparecen por completo. Esto significa que pasamos a un medio líquido. Separa el manto del núcleo externo.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span><K>Lehman</K>: a 4.900-5.150 km. Las P aceleran de nuevo — volvemos a un medio sólido. Separa el núcleo externo del interno.</span>
              </li>
            </ul>
          </section>

          <Divider />

          {/* Sección 4 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              4. Las capas de la Tierra<br className="hidden md:block" />
              <span className="text-tierra-slate text-xl md:text-2xl font-normal">— versión composición</span>
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              Hay dos formas de dividir la Tierra en capas: por composición (modelo geoquímico) y por comportamiento mecánico (modelo geodinámico). Primero la composición.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              La <K>corteza</K> es la capa más externa y la más fina. Pero no toda la corteza es igual:
            </p>
            <ul className="font-body text-lg leading-relaxed space-y-3 pl-1 mb-4">
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>La <K>corteza continental</K> es gruesa (35-70 km), variada y vieja. Sus rocas más antiguas tienen 3.800 millones de años. Está hecha de materiales menos densos, tipo granito. Si la cortas en vertical, arriba encuentras rocas sedimentarias y volcánicas, en medio metamórficas con plutónicas ácidas (diorita), y abajo rocas muy metamorfizadas con ígneas básicas (gabro).</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>La <K>corteza oceánica</K> es delgada (8-10 km), homogénea y joven — nunca supera los 180 millones de años (ya veremos por qué). Más densa, tipo basalto. Tiene tres capas simples: sedimentos arriba, basaltos en medio, gabros abajo.</span>
              </li>
            </ul>
            <p className="font-body text-lg leading-relaxed mb-4">
              El <K>manto</K> va desde la Moho hasta Gutenberg. Está hecho de <K>peridotitas</K>. Se divide en manto superior (con una zona de transición) y manto inferior. Mismo material, pero propiedades físicas diferentes según la profundidad.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              El <K>núcleo</K> es metálico: hierro y níquel, con algo de oxígeno y azufre.
            </p>
          </section>

          <Divider />

          {/* Sección 5 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              5. Las capas de la Tierra<br className="hidden md:block" />
              <span className="text-tierra-slate text-xl md:text-2xl font-normal">— versión dinámica</span>
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              Este modelo no mira de qué están hechas las capas, sino cómo se comportan mecánicamente. Y es fundamental para entender la tectónica de placas.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              La <K>litosfera</K> es la capa rígida exterior: incluye toda la corteza más la parte superior del manto. Está fracturada en placas que se mueven. En los océanos llega hasta 50 km de profundidad; en los continentes, hasta 100-300 km.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              La <K>astenosfera</K> está justo debajo. Es sólida, pero tan cerca del punto de fusión que se comporta de forma plástica — se deforma lentamente. Las ondas sísmicas se ralentizan aquí. Sobre ella "flotan" las placas litosféricas.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              La <K>mesosfera</K> llega hasta 2.900 km (es el manto inferior). Aquí se forman las células de convección: material caliente sube desde la frontera con el núcleo y material frío baja en las zonas de subducción. También están las plumas del manto — chorros de material caliente que suben.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              La <K>capa D</K> está en la base del manto, justo sobre el núcleo. Es heterogénea y ahí nacen los penachos térmicos.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              La <K>endosfera</K> es el núcleo: externo (fundido) e interno (sólido). El núcleo externo gira a distinta velocidad que el interno, y ese giro diferencial genera el campo magnético terrestre.
            </p>
          </section>

          <Divider />

          {/* Sección 6 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              6. Las pruebas del gran movimiento
            </h3>

            <blockquote className="border-l-4 border-terracotta pl-5 py-2 my-8">
              <p className="font-display text-xl md:text-2xl text-tierra-charcoal italic leading-snug">
                En 1912, Alfred Wegener propuso que los continentes se mueven. Le dijeron que estaba loco. Tenía razón.
              </p>
            </blockquote>

            <p className="font-body text-lg leading-relaxed mb-2">
              Sus pruebas de la <K>deriva continental</K>:
            </p>
            <ul className="font-body text-lg leading-relaxed space-y-3 pl-1 mb-4">
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span><strong>Geológicas</strong>: si juntas Sudamérica y África, las estructuras geológicas (cratones, cinturones montañosos) encajan como piezas de puzle.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span><strong>Paleontológicas</strong>: los mismos fósiles aparecen en continentes que hoy están separados por océanos enteros. Los bichos no cruzaron nadando.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span><strong>Paleoclimáticas</strong>: se encuentran <K>tillitas</K> (rocas glaciares) en regiones que hoy son tropicales. Esas rocas se formaron cuando esos continentes estaban en latitudes polares.</span>
              </li>
            </ul>
            <p className="font-body text-lg leading-relaxed mb-4">
              Wegener propuso que todos formaban un supercontinente, <K>Pangea</K>, que se fragmentó.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              El problema de Wegener: no supo explicar QUÉ movía los continentes. Eso lo resolvió <K>Arthur Holmes en 1929</K> con las <K>corrientes de convección</K> del manto.
            </p>
            <p className="font-body text-lg leading-relaxed mb-2">
              Las pruebas definitivas vinieron del estudio de los fondos oceánicos (gracias al sonar) y del magnetismo natural de las rocas:
            </p>
            <ul className="font-body text-lg leading-relaxed space-y-3 pl-1 mb-4">
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>Se descubrieron <K>dorsales oceánicas</K> (cordilleras submarinas) y <K>fosas oceánicas</K>, y que los volcanes y terremotos se concentran en esos bordes.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>Los minerales de hierro en las rocas se imantan cuando el magma se solidifica, quedando "congelada" la orientación del campo magnético de ese momento. Al medir esto en rocas de distintas edades y continentes, se obtienen <K>curvas de deriva polar</K> que no coinciden entre sí → los continentes se mueven.</span>
              </li>
              <li className="flex gap-3">
                <span className="text-volcanic mt-1 shrink-0">▸</span>
                <span>En el fondo oceánico, las <K>anomalías magnéticas</K> forman bandas simétricas a ambos lados de las dorsales → el fondo se está expandiendo desde las dorsales.</span>
              </li>
            </ul>
            <p className="font-body text-lg leading-relaxed mb-4">
              <K>Harry Hess (1960)</K> propuso la <K>expansión del fondo oceánico</K>: la corteza se crea en las dorsales, se separa, y se destruye en las zonas de subducción. Por eso la corteza oceánica nunca tiene más de 200 millones de años — está en constante reciclaje.
            </p>
          </section>

          <Divider />

          {/* Sección 7 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              7. Las placas y sus choques
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              Las <K>placas litosféricas</K> son fragmentos de litosfera de tamaño muy variable que encajan como un puzle gigante. La mayoría son mixtas (tienen parte continental y oceánica). Hay 8 grandes y varias menores. Dato: la placa del Pacífico es solo oceánica, la Arábiga es solo continental.
            </p>
            <p className="font-body text-lg leading-relaxed mb-4">
              Se mueven flotando sobre la astenosfera plástica, y donde se encuentran (los bordes) es donde pasa la acción geológica.
            </p>

            <h4 className="font-display text-xl font-semibold text-terracotta-dark mt-8 mb-4">Tres tipos de bordes:</h4>

            <div className="space-y-6 mb-4">
              <div className="bg-tierra-cream/60 rounded-xl p-5 md:p-6">
                <h5 className="font-display text-lg font-semibold text-petrol mb-2">1. Bordes pasivos (fallas transformantes)</h5>
                <p className="font-body text-base leading-relaxed">
                  Las placas se deslizan lateralmente una junto a otra. No se crea ni se destruye litosfera, pero el rozamiento genera terremotos. Ejemplo clásico: la <K>Falla de San Andrés</K>.
                </p>
              </div>

              <div className="bg-tierra-cream/60 rounded-xl p-5 md:p-6">
                <h5 className="font-display text-lg font-semibold text-petrol mb-2">2. Bordes constructivos (dorsales)</h5>
                <p className="font-body text-base leading-relaxed">
                  Las placas se separan. El magma sube por la grieta, se solidifica y forma nueva corteza oceánica. Hay vulcanismo poco explosivo (magma basáltico muy fluido) y terremotos superficiales poco intensos. Las dorsales son cordilleras submarinas de unos 3 km de altura y 60.000 km de longitud total — una por océano.
                </p>
              </div>

              <div className="bg-tierra-cream/60 rounded-xl p-5 md:p-6">
                <h5 className="font-display text-lg font-semibold text-petrol mb-2">3. Bordes destructivos (subducción y colisión)</h5>
                <p className="font-body text-base leading-relaxed mb-3">Las placas chocan. Tres variantes:</p>
                <ul className="font-body text-base leading-relaxed space-y-2 pl-1">
                  <li className="flex gap-3">
                    <span className="text-terracotta mt-1 shrink-0">▹</span>
                    <span><strong>Oceánica bajo continental</strong>: La oceánica (más densa y delgada) se mete debajo. Se forma una fosa oceánica, terremotos intensos que siguen un plano inclinado (<K>plano de Benioff</K>), actividad volcánica, y cordilleras (como los Andes).</span>
                  </li>
                  <li className="flex gap-3">
                    <span className="text-terracotta mt-1 shrink-0">▹</span>
                    <span><strong>Oceánica bajo oceánica</strong>: Una subduce bajo la otra, formando una fosa y un arco de islas volcánicas (como Japón).</span>
                  </li>
                  <li className="flex gap-3">
                    <span className="text-terracotta mt-1 shrink-0">▹</span>
                    <span><strong>Continental contra continental</strong>: Ninguna subduce fácilmente (ambas son poco densas). Se forma una cordillera enorme por compresión (como el Himalaya). Hay sismicidad pero <span className="font-bold text-terracotta-dark">NO vulcanismo</span>.</span>
                  </li>
                </ul>
              </div>
            </div>
          </section>

          <Divider />

          {/* Sección 8 */}
          <section>
            <h3 className="font-display text-2xl md:text-3xl font-semibold text-petrol mb-6 leading-snug">
              8. ¿Qué mueve todo esto?
            </h3>
            <p className="font-body text-lg leading-relaxed mb-4">
              El motor tiene dos componentes:
            </p>

            <div className="space-y-6 mb-4">
              <div className="bg-tierra-cream/60 rounded-xl p-5 md:p-6">
                <h5 className="font-display text-lg font-semibold text-volcanic-dark mb-2">🌡️ Temperatura</h5>
                <p className="font-body text-base leading-relaxed">
                  El interior de la Tierra está caliente (calor residual + desintegración radiactiva). Ese calor se transmite por <K>convección</K>: material caliente sube desde la capa D hasta la base de la litosfera en columnas ascendentes, y material frío baja en las zonas de subducción. Son las <K>células de convección</K> del manto.
                </p>
              </div>

              <div className="bg-tierra-cream/60 rounded-xl p-5 md:p-6">
                <h5 className="font-display text-lg font-semibold text-volcanic-dark mb-2">🪨 Gravedad</h5>
                <p className="font-body text-base leading-relaxed">
                  Cuando la litosfera oceánica se enfría y se vuelve más densa que el material de debajo, se hunde. Al hacerlo, tira del resto de la placa como si fuera una manta que se cae de la cama (<K>slab pull</K>). Además, desde las dorsales hay un empuje lateral: la nueva corteza "empuja" la vieja hacia los lados (<K>ridge push</K>).
                </p>
              </div>
            </div>

            {/* Closing pull quote */}
            <blockquote className="border-l-4 border-turquoise pl-5 py-2 my-8">
              <p className="font-display text-xl md:text-2xl text-tierra-charcoal italic leading-snug">
                La corteza oceánica se recicla constantemente: nace en las dorsales y se destruye al subducir bajo otra placa. Por eso nunca supera los 200 millones de años.
              </p>
            </blockquote>
          </section>

          {/* End marker */}
          <div className="flex items-center justify-center gap-3 mt-16 mb-8">

            <span className="text-tierra-slate text-xs font-body tracking-widest uppercase">Fin del resumen</span>
            <span className="block w-8 h-px bg-tierra-sand" />

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function Fichas({ deck }) {
      const [cards, setCards] = useState(() => shuffle(deck));
      const [index, setIndex] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [results, setResults] = useState([]); // { idx, knew }
      const [phase, setPhase] = useState('study'); // 'study' | 'summary' | 'review'
      const [slideKey, setSlideKey] = useState(0);

      const current = cards[index];
      const total = cards.length;
      const knew = results.filter(r => r.knew).length;
      const missed = results.filter(r => !r.knew).length;

      function answer(knew) {
        setResults(prev => [...prev, { idx: index, knew }]);
        setFlipped(false);
        if (index + 1 < total) {
          setTimeout(() => {
            setIndex(index + 1);
            setSlideKey(k => k + 1);
          }, 200);
        } else {
          setTimeout(() => setPhase('summary'), 300);
        }
      }

      function restart(onlyMissed) {
        if (onlyMissed) {
          const missedCards = results.filter(r => !r.knew).map(r => cards[r.idx]);
          setCards(shuffle(missedCards));
          setPhase('review');
        } else {
          setCards(shuffle(deck));
          setPhase('study');
        }
        setIndex(0);
        setFlipped(false);
        setResults([]);
        setSlideKey(k => k + 1);
      }

      // ─── Summary screen ───
      if (phase === 'summary') {
        const pct = Math.round((knew / total) * 100);
        let msg, msgColor;
        if (pct === 100) { msg = '¡Perfecto! Lo tienes dominado.'; msgColor = 'text-turquoise-dark'; }
        else if (pct >= 75) { msg = '¡Muy bien! Solo unos pocos fallos.'; msgColor = 'text-turquoise'; }
        else if (pct >= 50) { msg = 'Vas por buen camino. Repasa las que fallaste.'; msgColor = 'text-ochre-dark'; }
        else { msg = 'Toca repasar un poco más. ¡Tú puedes!'; msgColor = 'text-terracotta'; }

        return (
          <div className="page-enter max-w-md mx-auto text-center">
            <h2 className="font-display text-3xl md:text-4xl font-bold text-tierra-charcoal mb-2">Resultado</h2>
            <p className="font-body text-tierra-slate mb-8">{phase === 'review' ? 'Repaso de falladas' : `${total} fichas completadas`}</p>

            <div className="flex justify-center gap-8 mb-6">
              <div>
                <span className="block font-display text-4xl font-bold text-turquoise">{knew}</span>
                <span className="font-body text-sm text-tierra-slate">Sabía</span>
              </div>
              <div>
                <span className="block font-display text-4xl font-bold text-terracotta">{missed}</span>
                <span className="font-body text-sm text-tierra-slate">No sabía</span>
              </div>
            </div>

            {/* Progress bar */}
            <div className="w-full h-3 bg-tierra-sand rounded-full overflow-hidden mb-4">
              <div className="h-full bg-turquoise rounded-full transition-all" style={{ width: `${pct}%` }} />
            </div>
            <p className={`font-display text-lg font-semibold ${msgColor} mb-8`}>{msg}</p>

            <div className="flex flex-col sm:flex-row gap-3 justify-center">
              {missed > 0 && (
                <button
                  onClick={() => restart(true)}
                  className="px-6 py-3 bg-terracotta text-white font-body font-semibold rounded-xl hover:bg-terracotta-dark transition-colors cursor-pointer"
                >
                  Repasar las {missed} falladas
                </button>
              )}
              <button
                onClick={() => restart(false)}
                className="px-6 py-3 bg-tierra-cream text-tierra-charcoal font-body font-semibold rounded-xl hover:bg-tierra-sand transition-colors cursor-pointer"
              >
                Empezar de nuevo
              </button>
            </div>
          </div>
        );
      }

      // ─── Card screen ───
      return (
        <div className="page-enter max-w-lg mx-auto">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="font-display text-2xl md:text-3xl font-bold text-tierra-charcoal">
                {phase === 'review' ? 'Repaso' : 'Fichas de Estudio'}
              </h2>
              <p className="font-body text-sm text-tierra-slate mt-1">
                Intenta responder antes de voltear
              </p>
            </div>
            <span className="font-display text-lg font-semibold text-ochre-dark">
              {index + 1}<span className="text-tierra-slate/50">/{total}</span>
            </span>
          </div>

          {/* Progress bar */}
          <div className="w-full h-1.5 bg-tierra-sand rounded-full overflow-hidden mb-6">
            <div
              className="h-full bg-ochre rounded-full transition-all duration-300"
              style={{ width: `${((index) / total) * 100}%` }}
            />
          </div>

          {/* Card */}
          <div className="flip-perspective" key={slideKey}>
            <div
              className={`flip-card card-slide-in w-full h-72 md:h-80 cursor-pointer ${flipped ? 'flipped' : ''}`}
              onClick={() => setFlipped(!flipped)}
            >
              {/* Front */}
              <div className="flip-face w-full h-full bg-white rounded-2xl border border-tierra-sand p-6 md:p-8 flex flex-col justify-center items-center text-center shadow-sm">
                <span className="text-xs uppercase tracking-widest text-ochre font-body mb-4">Pregunta</span>
                <p className="font-body text-lg md:text-xl text-tierra-charcoal leading-relaxed">
                  {current.p}
                </p>
                <span className="mt-auto text-xs text-tierra-slate/40 font-body">Toca para voltear</span>
              </div>

              {/* Back */}
              <div className="flip-face flip-back w-full h-full bg-petrol rounded-2xl p-6 md:p-8 flex flex-col justify-center items-center text-center shadow-sm">
                <span className="text-xs uppercase tracking-widest text-turquoise-light font-body mb-4">Respuesta</span>
                <p className="font-body text-lg md:text-xl text-white/95 leading-relaxed">
                  {current.r}
                </p>
              </div>
            </div>
          </div>

          {/* Action buttons */}
          <div className={`flex gap-3 mt-6 transition-opacity duration-300 ${flipped ? 'opacity-100' : 'opacity-30 pointer-events-none'}`}>
            <button
              onClick={() => answer(false)}
              className="flex-1 py-3.5 bg-terracotta/10 text-terracotta-dark font-body font-semibold rounded-xl hover:bg-terracotta/20 transition-colors cursor-pointer"
            >
              No lo sabía ✗
            </button>
            <button
              onClick={() => answer(true)}
              className="flex-1 py-3.5 bg-turquoise/10 text-turquoise-dark font-body font-semibold rounded-xl hover:bg-turquoise/20 transition-colors cursor-pointer"
            >
              Lo sabía ✓
            </button>
          </div>
        </div>
      );
    }

    // ─── Quiz Interactivo ───
    const QUIZ_POOL_SIZE = 10; // preguntas por intento

    function prepareQuiz(pool) {
      return shuffle(pool).slice(0, QUIZ_POOL_SIZE).map(q => {
        const indices = q.opts.map((_, i) => i);
        const shuffled = shuffle(indices);
        return {
          ...q,
          shuffledOpts: shuffled.map(i => q.opts[i]),
          correctShuffled: shuffled.indexOf(q.correct),
        };
      });
    }

    function Quiz({ pool }) {
      const [questions, setQuestions] = useState(() => prepareQuiz(pool));
      const [index, setIndex] = useState(0);
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [phase, setPhase] = useState('playing'); // 'playing' | 'result'

      const current = questions[index];
      const total = questions.length;
      const answered = selected !== null;
      const isCorrect = selected === current.correctShuffled;

      function selectOption(i) {
        if (answered) return;
        setSelected(i);
        if (i === current.correctShuffled) setScore(s => s + 1);
      }

      function next() {
        if (index + 1 < total) {
          setIndex(index + 1);
          setSelected(null);
        } else {
          setPhase('result');
        }
      }

      function restart() {
        setQuestions(prepareQuiz(pool));
        setIndex(0);
        setSelected(null);
        setScore(0);
        setPhase('playing');
      }

      // ─── Result screen ───
      if (phase === 'result') {
        const pct = Math.round((score / total) * 100);
        let msg, msgColor, emoji;
        if (pct === 100)     { msg = '¡Puntuación perfecta! Dominas el tema.'; msgColor = 'text-turquoise-dark'; emoji = '🏆'; }
        else if (pct >= 80)  { msg = '¡Excelente! Estás casi lista para el examen.'; msgColor = 'text-turquoise'; emoji = '🌟'; }
        else if (pct >= 60)  { msg = 'Bien, pero repasa los fallos antes del examen.'; msgColor = 'text-ochre-dark'; emoji = '💪'; }
        else if (pct >= 40)  { msg = 'Necesitas repasar bastante. ¡Usa las fichas!'; msgColor = 'text-volcanic'; emoji = '📖'; }
        else                 { msg = 'Toca estudiar a fondo. Lee La Historia y vuelve.'; msgColor = 'text-terracotta'; emoji = '🔄'; }

        return (
          <div className="page-enter max-w-md mx-auto text-center">
            <span className="text-5xl block mb-4">{emoji}</span>
            <h2 className="font-display text-3xl md:text-4xl font-bold text-tierra-charcoal mb-2">
              {score} de {total}
            </h2>
            <p className="font-body text-tierra-slate mb-6">{pct}% de aciertos · {pool.length} preguntas en el banco</p>

            <div className="w-full h-3 bg-tierra-sand rounded-full overflow-hidden mb-4">
              <div className="h-full bg-turquoise rounded-full transition-all" style={{ width: `${pct}%` }} />
            </div>
            <p className={`font-display text-lg font-semibold ${msgColor} mb-8`}>{msg}</p>

            <button
              onClick={restart}
              className="px-8 py-3.5 bg-petrol text-white font-body font-semibold rounded-xl hover:bg-petrol-dark transition-colors cursor-pointer"
            >
              Intentar de nuevo
            </button>
          </div>
        );
      }

      // ─── Question screen ───
      return (
        <div className="page-enter max-w-lg mx-auto">
          <div className="flex items-center justify-between mb-6">
            <h2 className="font-display text-2xl md:text-3xl font-bold text-tierra-charcoal">Quiz</h2>
            <span className="font-display text-lg font-semibold text-turquoise-dark">
              {index + 1}<span className="text-tierra-slate/50">/{total}</span>
            </span>
          </div>

          {/* Progress bar */}
          <div className="w-full h-1.5 bg-tierra-sand rounded-full overflow-hidden mb-8">
            <div
              className="h-full bg-turquoise rounded-full transition-all duration-300"
              style={{ width: `${(index / total) * 100}%` }}
            />
          </div>

          {/* Score pill */}
          <div className="flex justify-end mb-4">
            <span className="font-body text-sm text-tierra-slate bg-tierra-cream px-3 py-1 rounded-full">
              Aciertos: <span className="font-semibold text-turquoise-dark">{score}</span>
            </span>
          </div>

          {/* Question */}
          <div className="mb-6">
            <p className="font-body text-xl md:text-2xl text-tierra-charcoal leading-relaxed">
              {current.q}
            </p>
          </div>

          {/* Options */}
          <div className="space-y-3 mb-6">
            {current.shuffledOpts.map((opt, i) => {
              let style = 'bg-white border-tierra-sand hover:border-ochre/50 cursor-pointer';
              if (answered) {
                if (i === current.correctShuffled) {
                  style = 'bg-turquoise/10 border-turquoise ring-2 ring-turquoise/30';
                } else if (i === selected && !isCorrect) {
                  style = 'bg-terracotta/10 border-terracotta ring-2 ring-terracotta/30';
                } else {
                  style = 'bg-white border-tierra-sand opacity-50';
                }
              } else if (i === selected) {
                style = 'bg-ochre/10 border-ochre';
              }

              return (
                <button
                  key={i}
                  onClick={() => selectOption(i)}
                  disabled={answered}
                  className={`w-full text-left px-5 py-4 border-2 rounded-xl font-body text-base transition-all ${style}`}
                >
                  <span className="font-semibold text-tierra-slate mr-2">
                    {String.fromCharCode(65 + i)}.
                  </span>
                  {opt}
                </button>
              );
            })}
          </div>

          {/* Feedback */}
          {answered && (
            <div className={`p-4 rounded-xl mb-6 ${isCorrect ? 'bg-turquoise/10' : 'bg-terracotta/10'}`}>
              <p className={`font-body text-sm font-semibold mb-1 ${isCorrect ? 'text-turquoise-dark' : 'text-terracotta-dark'}`}>
                {isCorrect ? '¡Correcto!' : 'Incorrecto'}
              </p>
              <p className="font-body text-sm text-tierra-charcoal leading-relaxed">
                {current.exp}
              </p>
            </div>
          )}

          {/* Next button */}
          {answered && (
            <button
              onClick={next}
              className="w-full py-3.5 bg-petrol text-white font-body font-semibold rounded-xl hover:bg-petrol-dark transition-colors cursor-pointer"
            >
              {index + 1 < total ? 'Siguiente pregunta' : 'Ver resultado'}
            </button>
          )}
        </div>
      );
    }

      { p: '¿Qué es el magmatismo?', r: 'Conjunto de procesos que comprenden la formación de los magmas, su evolución y su consolidación, dando lugar a las rocas magmáticas.' },
      { p: '¿Qué es el magma y de qué está compuesto?', r: 'Roca fundida. Compuesto por silicatos fundidos, con posibles óxidos o metales, y cierta proporción de fluidos (H₂O, CO₂) que le dan fluidez.' },
      { p: '¿Qué papel juegan los fluidos (H₂O, CO₂) en el magma?', r: 'Le proporcionan mayor fluidez y, al romper enlaces en los silicatos, rebajan el punto de fusión.' },
      { p: '¿Cuáles son los tres tipos de magma y cuál es el más abundante?', r: 'Basáltico (básico), granítico (ácido) y andesítico (intermedio). El basáltico es el más abundante y fluido.' },
      { p: '¿Cómo se forma el magma basáltico?', r: 'Por fusión parcial de las rocas del manto terrestre a altas temperaturas.' },
      { p: '¿Cómo se forma el magma granítico?', r: 'Por la fusión de la corteza continental. Es el más viscoso y el que funde a menor temperatura.' },
      { p: '¿Cómo se forma el magma andesítico?', r: 'Por fusión parcial de la corteza oceánica. Es el menos abundante.' },
      { p: '¿Qué son los diagramas P/T?', r: 'Diagramas presión (profundidad)-temperatura que muestran cuándo funde una roca. Incluyen isoterma, sólidus y líquidus.' },
      { p: '¿Qué es la isoterma o gradiente geotérmico?', r: 'La temperatura media a la que están las rocas en el interior terrestre a cada profundidad.' },
      { p: '¿Qué es la curva de sólidus?', r: 'La temperatura a la que las rocas empiezan a fundirse. Por debajo todo es sólido; no hay magmas.' },
      { p: '¿Qué es la curva de líquidus?', r: 'La temperatura a la que una roca está fundida por completo. Entre sólidus y líquidus la fusión es parcial.' },
      { p: 'Nombra los tres factores que pueden provocar la fusión parcial del manto.', r: '1) Aumento local de temperatura. 2) Disminución de presión. 3) Aumento de agua (rompe enlaces en los silicatos).' },
      { p: '¿Por qué el magma asciende una vez formado?', r: 'Porque es menos denso que las rocas que lo rodean.' },
      { p: '¿Qué es una cámara magmática?', r: 'Una acumulación de magma que se forma cuando este, al ascender, alcanza una zona de rocas de igual densidad y se detiene.' },
      { p: '¿Qué ocurre si el aporte de magma a la cámara es continuo?', r: 'La cámara se sobrepresiona y parte del magma sale, produciendo una erupción volcánica y rocas volcánicas.' },
      { p: 'Diferencia entre rocas plutónicas, volcánicas y filonianas (dónde cristalizan).', r: 'Plutónicas: dentro de la cámara magmática. Volcánicas: en la superficie tras erupción. Filonianas: en las vías de ascenso.' },
      { p: '¿Qué textura tienen las rocas plutónicas y por qué?', r: 'Textura granuda o pegmatítica, con cristales grandes visibles a simple vista, porque la cristalización es lenta en profundidad.' },
      { p: '¿Qué textura tienen las rocas volcánicas y por qué?', r: 'Microcristalina, porfídica o vítrea — cristales pequeños o inexistentes — porque solidifican muy rápido en superficie.' },
      { p: '¿Cómo cristaliza un magma al enfriarse?', r: 'Lentamente y por partes: los minerales de punto de fusión más alto (y más densos) cristalizan primero; después los de menor punto de fusión.' },
      { p: '¿Dónde se produce el 80% del magmatismo terrestre?', r: 'En los bordes constructivos o dorsales oceánicas, por disminución de presión asociada a los esfuerzos de tensión.' },
      { p: '¿Qué rocas se forman en las dorsales?', r: 'Magma basáltico: la mayoría consolida en profundidad formando gabro; el resto asciende y forma basalto. Ambas constituyen la corteza oceánica.' },
      { p: '¿Qué porcentaje del magmatismo se produce en las zonas de subducción y por qué?', r: 'El 12%, por aumento de temperatura debido al rozamiento entre placas.' },
      { p: '¿Qué rocas se forman en las zonas de subducción?', r: 'Superficialmente: basaltos (de magmas basálticos). En profundidad: granitos (de magmas graníticos más viscosos).' },
      { p: '¿Qué es el vulcanismo intraplaca?', r: 'Magmatismo en el interior de una placa, debido a puntos calientes del manto. Más frecuente en zonas oceánicas (Hawaii) que continentales (Yellowstone).' },
      { p: '¿Qué es un batolito?', r: 'Gran masa de rocas plutónicas que corresponde a la cámara magmática cristalizada. Puede ocupar miles de km². Ej: Pico de la Miel.' },
      { p: 'Diferencia entre sill y dique/filón.', r: 'Sill: masa tabular generalmente horizontal. Dique o filón: masa tabular vertical.' },
      { p: '¿Qué es una colada de lava y qué tipos hay?', r: 'Manto de lava solidificado en las laderas del volcán. Lavas cordadas (magmas fluidos) y lavas en bloque (magmas viscosos).' },
      { p: '¿Qué es la chimenea volcánica?', r: 'Masa tubular de rocas magmáticas que corresponde al conducto de salida del magma (ej: Torre del Diablo).' },
      { p: 'Describe los cuatro tipos principales de erupción volcánica.', r: '1) Hawaiana: tranquila y fluida. 2) Estromboliana: más explosiva, dispersión pequeña. 3) Vulcaniana: muchos piroclastos, explosividad moderada-violenta. 4) Pliniana: muy explosivas, grandes emisiones de piroclastos.' },
      { p: '¿Qué es el IVE?', r: 'Índice de Explosividad Volcánica. Cuantifica la peligrosidad de un volcán. Escala del 0 al 8.' },
      { p: 'Nombra los tres tipos de flujos volcánicos.', r: 'Coladas de lava, nubes ardientes (flujos piroclásticos) y lahares.' },
      { p: '¿Qué son los precursores volcánicos?', r: 'Fenómenos que anuncian una erupción: movimientos sísmicos, elevación del terreno, emisión de gases, cambios de temperatura.' },
      { p: 'Nombra cuatro medidas preventivas frente al riesgo volcánico.', r: 'Evacuación de la población, cambio del curso de las coladas, solidificación con agua fría, distribución de mascarillas.' },
      { p: '¿Qué es el metamorfismo?', r: 'Cambios fisicoquímicos que sufren las rocas, sin perder el estado sólido, al cambiar las condiciones de presión y temperatura. Forma rocas metamórficas.' },
      { p: '¿De qué tipos de roca pueden formarse las rocas metamórficas?', r: 'De cualquier roca preexistente: sedimentaria, magmática o metamórfica.' },
      { p: '¿Qué es la recristalización y a partir de qué temperatura ocurre?', r: 'A partir de 300°C los minerales se movilizan y se reagrupan en cristales mayores, sin cambiar la composición. Ej: caliza → mármol.' },
      { p: '¿Qué es la foliación o esquistosidad?', r: 'Estructura orientada que se desarrolla cuando los minerales planares (micas, arcillas) o alargados (anfíboles, piroxenos) se orientan perpendicularmente al esfuerzo de compresión.' },
      { p: '¿Qué son los minerales metamórficos?', r: 'Minerales nuevos que aparecen cuando los minerales originales se inestabilizan con la P y T, reaccionan entre sí y forman fases nuevas.' },
      { p: '¿Qué es la brechificación?', r: 'Proceso de rotura por presiones dirigidas o tectónicas cerca de fallas. Las rocas se rompen y forman brechas de falla.' },
      { p: '¿Qué es la deshidratación metamórfica?', r: 'Pérdida de H₂O y CO₂ por minerales hidratados (arcillas) y carbonatos al calentarse. Esos fluidos facilitan las reacciones entre minerales.' },
      { p: 'Nombra los tres agentes del metamorfismo.', r: 'Temperatura (200-800°C), presión (2-15 kbar) y presencia de fluidos o volátiles.' },
      { p: '¿A qué se debe el aumento de temperatura en el metamorfismo?', r: 'Al gradiente geotérmico al profundizar en la corteza, o al contacto con magmas calientes.' },
      { p: '¿Qué tipos de presión intervienen en el metamorfismo?', r: 'Litostática (peso de los materiales encima), de los fluidos entre los granos, y tectónica (esfuerzos de compresión).' },
      { p: '¿Qué tipos de metamorfismo existen?', r: 'Dinámico o de presión, de contacto o térmico, y regional.' },
      { p: '¿Qué caracteriza al metamorfismo dinámico?', r: 'Mucha presión, poca temperatura. Se da en zonas poco profundas de grandes fallas. Produce brechificación → brechas de falla.' },
      { p: '¿Qué caracteriza al metamorfismo de contacto?', r: 'Mucha temperatura, poca presión. Ocurre por contacto con magmas calientes. Forma una aureola de contacto de rocas metamórficas.' },
      { p: '¿Qué caracteriza al metamorfismo regional?', r: 'Es el más importante. P y T aumentan en paralelo. Afecta a extensas zonas de corteza continental. Grado bajo (pizarras) hasta alto (gneises, migmatitas).' },
      { p: '¿Dónde se produce principalmente el metamorfismo regional?', r: 'En las zonas de subducción.' },
      { p: '¿De qué tres factores depende la gran diversidad de rocas metamórficas?', r: '1) Naturaleza de la roca original. 2) Tipo de metamorfismo. 3) Grado de metamorfismo alcanzado.' },
      { p: 'Clasificación de las rocas metamórficas según su estructura.', r: 'Orientadas (las más comunes, de rocas silicatadas como arcillas, areniscas y granitos) y no orientadas.' },
      { p: 'Nombra los tres tipos de deformación de las rocas.', r: 'Elástica, plástica y por rotura.' },
      { p: '¿Qué es la deformación elástica y qué genera?', r: 'Deformación que desaparece al cesar el esfuerzo. Es la responsable de los terremotos.' },
      { p: '¿Cuándo se produce deformación plástica?', r: 'Cuando se supera el límite de elasticidad. Las rocas se doblan (pliegues).' },
      { p: '¿Cuándo se produce deformación por rotura?', r: 'Cuando se supera el límite de plasticidad. Las rocas se fracturan (fallas).' },
      { p: '¿Qué es un riesgo geológico?', r: 'Circunstancia, proceso o suceso geológico que, por su localización, severidad y frecuencia, supone una amenaza para la salud, seguridad o bienestar de personas, bienes o economía.' },
      { p: 'Define peligrosidad (en riesgo geológico).', r: 'Probabilidad de que un fenómeno catastrófico suceda en un intervalo de tiempo determinado.' },
      { p: 'Define exposición (en riesgo geológico).', r: 'Conjunto de personas, bienes e infraestructuras expuestos al riesgo.' },
      { p: 'Define vulnerabilidad (en riesgo geológico).', r: 'Grado del daño esperable cuando el fenómeno ocurre.' },
      { p: '¿Qué rocas forman la corteza oceánica según el magmatismo de dorsales?', r: 'Gabro (consolidado en profundidad) y basalto (consolidado en superficie), ambos a partir de magma basáltico.' },
      { p: '¿Por qué en las dorsales hay vulcanismo poco explosivo?', r: 'Porque el magma es basáltico y muy fluido, permitiendo que los gases escapen fácilmente.' },
    ];
