      { q: '¿Qué es el IVE?', opts: ['Índice de Valoración Eruptiva', 'Índice de Explosividad Volcánica (0-8)', 'Indicador de Vulcanismo Europeo', 'Índice de Viscosidad Efectiva'], correct: 1, exp: 'El IVE es el Índice de Explosividad Volcánica. Escala del 0 al 8 para cuantificar la peligrosidad.' },
      { q: '¿Cuál de estos NO es un tipo de flujo volcánico?', opts: ['Coladas de lava', 'Lahares', 'Nubes ardientes', 'Tillitas'], correct: 3, exp: 'Los flujos son coladas, nubes ardientes (flujos piroclásticos) y lahares. Las tillitas son rocas glaciares.' },
      { q: '¿Qué son los precursores volcánicos?', opts: ['Productos de la erupción', 'Señales que anuncian una erupción: sismicidad, elevación del terreno, gases, calor', 'Instrumentos de medición', 'Fases del magma ascendente'], correct: 1, exp: 'Los precursores son fenómenos previos al ascenso del magma que permiten predecir la erupción.' },
      { q: '¿Cuál de estas NO es una medida preventiva frente al riesgo volcánico?', opts: ['Evacuación de la población', 'Distribución de mascarillas', 'Desvío del curso de las coladas', 'Provocar una explosión controlada del volcán'], correct: 3, exp: 'Las medidas típicas son evacuación, cambio de curso de las coladas, solidificación con agua fría y distribución de mascarillas.' },
      // Metamorfismo
      { q: '¿Qué es el metamorfismo?', opts: ['Fusión y solidificación de rocas', 'Cambios fisicoquímicos en rocas SIN perder el estado sólido al cambiar P y T', 'Erosión superficial', 'Formación de sedimentos'], correct: 1, exp: 'El metamorfismo son cambios fisicoquímicos sin perder el estado sólido por cambios en P y T. Clave: no hay fusión.' },
      { q: '¿De qué tipos de roca pueden proceder las rocas metamórficas?', opts: ['Solo de sedimentarias', 'Solo de magmáticas', 'De cualquier roca preexistente (sedimentaria, magmática o metamórfica)', 'Solo de otras metamórficas'], correct: 2, exp: 'Cualquier roca puede convertirse en metamórfica si se somete a los factores adecuados.' },
      { q: '¿Qué ejemplo ilustra la recristalización metamórfica?', opts: ['Basalto → gabro', 'Caliza → mármol', 'Granito → basalto', 'Arena → arenisca'], correct: 1, exp: 'La recristalización ocurre a partir de 300°C y el ejemplo clásico es la transformación de caliza en mármol.' },
      { q: '¿Qué es la foliación o esquistosidad?', opts: ['Un tipo de falla', 'Estructura orientada de minerales perpendicular al esfuerzo', 'Un proceso sedimentario', 'La capa externa del volcán'], correct: 1, exp: 'Es una estructura orientada: micas, arcillas, anfíboles y piroxenos se orientan perpendiculares al esfuerzo de compresión.' },
      { q: '¿Qué se forma por brechificación?', opts: ['Mármol', 'Brechas de falla', 'Gneises', 'Pizarras'], correct: 1, exp: 'La brechificación ocurre por presiones dirigidas cerca de las fallas y produce brechas de falla.' },
      { q: '¿Qué ocurre en la deshidratación metamórfica?', opts: ['Los minerales absorben agua', 'Minerales hidratados (arcillas) y carbonatos pierden H₂O y CO₂, que pasan a los fluidos', 'Se forman nuevos cristales de hielo', 'Se produce fusión parcial'], correct: 1, exp: 'Las arcillas y carbonatos expuestos a alta temperatura pierden H₂O y CO₂, que facilitan las reacciones entre minerales.' },
      { q: '¿En qué rango de temperatura actúa el agente térmico del metamorfismo?', opts: ['0-100°C', '100-200°C', '200-800°C', '800-1500°C'], correct: 2, exp: 'El metamorfismo ocurre entre los 200 y 800°C. Por debajo no hay cambios mineralógicos; por encima hay fusión.' },
      { q: '¿En qué rango actúa la presión en el metamorfismo?', opts: ['0-1 kbar', '2-15 kbar', '15-50 kbar', '50-100 kbar'], correct: 1, exp: 'La presión actúa entre 2 y 15 kbar. Litostática + de fluidos + tectónica.' },
      { q: '¿Cuál de estos NO es un tipo de presión en el metamorfismo?', opts: ['Litostática', 'De fluidos', 'Tectónica', 'Atmosférica'], correct: 3, exp: 'Los tres tipos son litostática (peso), de fluidos intergranulares y tectónica (compresión). La atmosférica es despreciable en profundidad.' },
      { q: '¿Cuál es el tipo de metamorfismo más importante?', opts: ['Dinámico', 'De contacto', 'Regional', 'Térmico'], correct: 2, exp: 'El metamorfismo regional es el más importante: afecta a extensas zonas de corteza continental (cientos de miles de km²).' },
      { q: '¿Qué caracteriza al metamorfismo dinámico?', opts: ['Mucha temperatura, poca presión', 'Mucha presión, poca temperatura; brechificación', 'P y T aumentan en paralelo', 'Solo actúa con agua'], correct: 1, exp: 'El metamorfismo dinámico ocurre en zonas poco profundas de grandes fallas: mucha presión, poca temperatura → brechas de falla.' },
      { q: '¿Qué caracteriza al metamorfismo de contacto?', opts: ['Solo presión', 'Mucha temperatura, poca presión; aureola de contacto alrededor del magma', 'Fusión total de la roca', 'Ocurre solo en el manto'], correct: 1, exp: 'El metamorfismo de contacto o térmico ocurre por contacto con magmas calientes, formando una aureola alrededor.' },
      { q: '¿Qué caracteriza al metamorfismo regional?', opts: ['Solo calor, sin presión', 'P y T aumentan en paralelo; afecta extensas zonas de corteza continental', 'Es el menos importante', 'Ocurre solo en el núcleo'], correct: 1, exp: 'En el metamorfismo regional P y T aumentan juntas. Grado bajo (pizarras) a alto (gneises, migmatitas).' },
      { q: '¿Dónde se produce principalmente el metamorfismo regional?', opts: ['En las dorsales', 'En puntos calientes', 'En las zonas de subducción', 'En fallas transformantes'], correct: 2, exp: 'El metamorfismo regional se produce principalmente en las zonas de subducción.' },
      { q: '¿Qué roca representa metamorfismo regional de grado alto?', opts: ['Pizarra', 'Mármol', 'Gneises o migmatitas', 'Brecha de falla'], correct: 2, exp: 'En el metamorfismo regional: grado bajo → pizarras; grado alto → gneises y migmatitas.' },
      { q: '¿De qué 3 factores depende la diversidad de rocas metamórficas?', opts: ['Edad, color y densidad', 'Naturaleza de la roca original, tipo y grado de metamorfismo', 'Latitud, altitud y temperatura', 'Presión, volumen y masa'], correct: 1, exp: 'Los tres factores son: roca original, tipo de metamorfismo y grado alcanzado.' },
      { q: '¿Qué son las rocas metamórficas orientadas?', opts: ['Rocas con cristales aleatorios', 'Rocas con foliación, procedentes de rocas silicatadas (arcillas, areniscas, granitos)', 'Rocas volcánicas', 'Rocas sin metamorfismo'], correct: 1, exp: 'Las orientadas proceden del metamorfismo de rocas silicatadas y son las más comunes.' },
      // Deformación y riesgo
      { q: '¿Qué deformación es responsable de los terremotos?', opts: ['Plástica', 'Por rotura', 'Elástica', 'Química'], correct: 2, exp: 'La deformación elástica (la roca vuelve a su estado al cesar el esfuerzo) es la responsable de los terremotos.' },
      { q: '¿Qué ocurre cuando se supera el límite elástico?', opts: ['La roca vuelve a su estado', 'La roca se dobla (deformación plástica)', 'La roca se fractura', 'No pasa nada'], correct: 1, exp: 'Al superar el límite elástico se entra en deformación plástica: las rocas se doblan → pliegues.' },
      { q: '¿Qué ocurre cuando se supera el límite plástico?', opts: ['La roca se comba', 'La roca vuelve a su forma original', 'La roca se fractura (rotura)', 'Se funde'], correct: 2, exp: 'Al superar el límite plástico se produce la deformación por rotura: las rocas se fracturan → fallas.' },
      { q: '¿Qué es un riesgo geológico?', opts: ['Un fenómeno meteorológico', 'Un proceso geológico que, por localización, severidad y frecuencia, amenaza a personas, bienes o economía', 'La probabilidad de encontrar minerales', 'Un estudio sísmico'], correct: 1, exp: 'El riesgo geológico es toda circunstancia, proceso o suceso geológico que, por su localización, severidad y frecuencia, suponga una amenaza para la salud, seguridad o bienestar.' },
      { q: '¿Qué es la peligrosidad en un riesgo geológico?', opts: ['El daño producido', 'Probabilidad de que ocurra el fenómeno catastrófico en un intervalo de tiempo', 'Los bienes expuestos', 'La magnitud máxima registrada'], correct: 1, exp: 'La peligrosidad es la probabilidad de que suceda el fenómeno catastrófico en un intervalo de tiempo determinado.' },
      { q: '¿Qué es la exposición en un riesgo geológico?', opts: ['El grado del daño', 'La probabilidad del fenómeno', 'Conjunto de personas, bienes e infraestructuras expuestos al riesgo', 'La edad de las rocas'], correct: 2, exp: 'La exposición es el conjunto de personas, bienes e infraestructuras que están en zona de riesgo.' },
      { q: '¿Qué es la vulnerabilidad?', opts: ['El daño esperable cuando el fenómeno ocurre', 'La probabilidad del evento', 'El número de volcanes de una región', 'La cantidad de magma'], correct: 0, exp: 'La vulnerabilidad es el grado del daño esperable cuando el fenómeno se produce.' },
    ];

    // ═══════════════════════════════════════════════════════════════
    // REGISTRO DE TEMAS
    // Añadir nuevos temas aquí siguiendo este mismo esquema.
    // ═══════════════════════════════════════════════════════════════
    const TOPICS = [
      {
        id: 'estructura',
        unidad: 'Unidad 1',
        title: 'Estructura de la Tierra',
        shortTitle: 'Estructura de la Tierra',
        description: 'El interior de la Tierra, los métodos para estudiarlo, las capas y la tectónica de placas.',
        footer: 'Tectónica de Placas',
        mapaRoot: 'Estructura de la Tierra y Tectónica de Placas',
        mapa: MAPA_ESTRUCTURA,
        fichas: FICHAS_ESTRUCTURA,
        quiz: QUIZ_ESTRUCTURA,
        Historia: HistoriaEstructura,
        accent: 'petrol',
      },
      {
        id: 'procesos',
        unidad: 'Unidad 2',
        title: 'Procesos Geológicos Internos',
        shortTitle: 'Procesos Internos',
        description: 'Magmatismo, vulcanismo, metamorfismo, deformación de las rocas y riesgo geológico.',
        footer: 'Magmatismo · Vulcanismo · Metamorfismo',
        mapaRoot: 'Procesos Geológicos Internos',
        mapa: MAPA_PROCESOS,
        fichas: FICHAS_PROCESOS,
        quiz: QUIZ_PROCESOS,
        Historia: HistoriaProcesos,
        accent: 'volcanic',
      },
    ];

    const ACCENT_STYLES = {
      petrol:    { bar: 'bg-petrol',    text: 'text-petrol-dark',    soft: 'bg-petrol/5',    border: 'border-petrol/20' },
      volcanic:  { bar: 'bg-volcanic',  text: 'text-volcanic-dark',  soft: 'bg-volcanic/5',  border: 'border-volcanic/20' },
      terracotta:{ bar: 'bg-terracotta',text: 'text-terracotta-dark',soft: 'bg-terracotta/5',border: 'border-terracotta/20' },
      turquoise: { bar: 'bg-turquoise', text: 'text-turquoise-dark', soft: 'bg-turquoise/5', border: 'border-turquoise/20' },
      ochre:     { bar: 'bg-ochre',     text: 'text-ochre-dark',     soft: 'bg-ochre/5',     border: 'border-ochre/20' },
    };

    // ─── Selector de Tema ───
    function TopicSelector({ onSelect }) {
      return (
        <div className="page-enter max-w-3xl mx-auto px-4 py-12 md:py-20">
          <header className="mb-10 text-center">
            <p className="font-body text-sm uppercase tracking-widest text-volcanic mb-3">Geología · 1º Bachillerato</p>
            <h1 className="font-display text-4xl md:text-5xl font-bold text-tierra-charcoal leading-tight mb-4">
              Elige un tema para estudiar
            </h1>
            <p className="font-body text-lg text-tierra-slate leading-relaxed max-w-xl mx-auto">
              Cada tema tiene su mapa conceptual, su resumen narrativo, sus fichas y su quiz.
            </p>
          </header>

          <div className="grid gap-5 md:grid-cols-2">
            {TOPICS.map(topic => {
              const a = ACCENT_STYLES[topic.accent] || ACCENT_STYLES.petrol;
              return (
                <button
                  key={topic.id}
                  onClick={() => onSelect(topic.id)}
                  className={`
                    group text-left bg-white border ${a.border} rounded-2xl p-6 md:p-7
                    hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 cursor-pointer
                    relative overflow-hidden
                  `}
                >
                  <span className={`absolute top-0 left-0 right-0 h-1 ${a.bar}`} />
                  <p className={`font-body text-xs uppercase tracking-widest ${a.text} mb-2`}>
                    {topic.unidad}
                  </p>
                  <h2 className="font-display text-2xl md:text-3xl font-bold text-tierra-charcoal leading-tight mb-3">
                    {topic.title}
                  </h2>
                  <p className="font-body text-base text-tierra-slate leading-relaxed mb-5">
                    {topic.description}
                  </p>
                  <div className="flex flex-wrap gap-2 mb-5">
                    {TABS.map(t => (
                      <span key={t.id} className={`${a.soft} ${a.text} text-xs font-body px-2.5 py-1 rounded-full flex items-center gap-1`}>
                        <span>{t.icon}</span>
                        <span>{t.shortLabel}</span>
                      </span>
                    ))}
                  </div>
                  <span className={`inline-flex items-center gap-1.5 font-body text-sm font-semibold ${a.text} group-hover:gap-2.5 transition-all`}>
                    Estudiar este tema
                    <span>→</span>
                  </span>
                </button>
              );
            })}
          </div>

          <footer className="mt-16 text-center">
            <p className="font-body text-xs text-tierra-slate/60">
              Se irán añadiendo más temas con el tiempo.
            </p>
          </footer>
        </div>
      );
    }

    // ─── Main App ───
    function App() {
      const [activeTopicId, setActiveTopicId] = useState(null);
      const [activeTab, setActiveTab] = useState('historia');

      const topic = TOPICS.find(t => t.id === activeTopicId) || null;

      const renderPage = useCallback(() => {
        if (!topic) return null;
        const HistoriaCmp = topic.Historia;
        switch (activeTab) {
          case 'mapa':     return <MapaConceptual data={topic.mapa} rootLabel={topic.mapaRoot} />;
          case 'historia': return <HistoriaCmp />;
          case 'fichas':   return <Fichas deck={topic.fichas} />;
          case 'quiz':     return <Quiz pool={topic.quiz} />;
          default:         return null;
        }
      }, [activeTab, topic]);

      function selectTopic(id) {
        setActiveTopicId(id);
        setActiveTab('historia');
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      function backToTopics() {
        setActiveTopicId(null);
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      if (!topic) {
        return (
          <div className="min-h-screen bg-tierra-bg font-body">
            <TopicSelector onSelect={selectTopic} />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-tierra-bg font-body">
          {/* ── Header ── */}
          <header className="sticky top-0 z-50 bg-tierra-bg/95 backdrop-blur-sm border-b border-tierra-sand">
            <div className="max-w-4xl mx-auto px-4">
              {/* Title bar */}
              <div className="flex items-center gap-3 pt-3 pb-2">
                <button
                  onClick={backToTopics}
                  className="flex items-center gap-1 text-tierra-slate hover:text-tierra-charcoal font-body text-sm cursor-pointer transition-colors"
                  aria-label="Volver a los temas"
                >
                  <span className="text-base">←</span>
                  <span className="hidden sm:inline">Temas</span>
                </button>
                <span className="block w-px h-5 bg-tierra-sand" />
                <h1 className="font-display text-lg md:text-xl font-bold text-tierra-charcoal tracking-tight">
                  Geología
                </h1>
                <span className="font-body text-sm text-tierra-slate hidden sm:inline truncate">
                  {topic.unidad} · {topic.title}
                </span>
                <span className="font-body text-xs text-tierra-slate sm:hidden truncate">
                  {topic.unidad}
                </span>
              </div>

              {/* Tab navigation */}
              <nav className="flex gap-1" role="tablist">
                {TABS.map(tab => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button
                      key={tab.id}
                      role="tab"
                      aria-selected={isActive}
                      onClick={() => setActiveTab(tab.id)}
                      className={`
                        flex-1 flex items-center justify-center gap-1.5
                        py-2.5 px-2 text-sm font-medium rounded-t-lg
                        transition-colors duration-200 cursor-pointer
                        ${isActive
                          ? 'text-volcanic-dark tab-active'
                          : 'text-tierra-slate hover:text-tierra-charcoal hover:bg-tierra-cream/50'
                        }
                      `}
                    >
                      <span className="text-base leading-none">{tab.icon}</span>
                      <span className="hidden sm:inline font-body">{tab.label}</span>
                      <span className="sm:hidden font-body text-xs">{tab.shortLabel}</span>
                    </button>
                  );
                })}
              </nav>
            </div>
          </header>

          {/* ── Content ── */}
          <main className="max-w-4xl mx-auto px-4 py-8 md:py-12" key={`${topic.id}-${activeTab}`}>
            {renderPage()}
          </main>

          {/* ── Footer ── */}
          <footer className="border-t border-tierra-sand py-6 mt-12">
            <p className="text-center font-body text-xs text-tierra-slate/60">
              1º Bachillerato · Geología · {topic.footer}
            </p>
          </footer>
        </div>
      );
    }

    // ─── Mount ───
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
